name: Build & Release

# Triggers when you push a version tag: git tag v1.2 && git push origin v1.2
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Read version from version.txt
        id: ver
        shell: bash
        run: |
          VER=$(sed 's/^[vV]//' version.txt | tr -d '[:space:]')
          VER4=$(echo "${VER}.0.0.0" | cut -d. -f1-4)
          echo "version=$VER"   >> $GITHUB_OUTPUT
          echo "version4=$VER4" >> $GITHUB_OUTPUT
          echo "Version: $VER   PE: $VER4"

      - name: Build release notes from CHANGELOG.md
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"

          # Extract this version's section: match the "## vX.Y[.Z]" header
          # (whether or not a date follows it), capture until the next "## "
          # header, drop horizontal-rule lines, and trim blank lines off both
          # ends. The version's dots are escaped so they match literally.
          awk -v ver="$VER" '
            BEGIN { gsub(/\./, "\\.", ver); pat = "^## v" ver "([^0-9]|$)" }
            !found && $0 ~ pat { found=1; next }
            found && /^## /    { done=1 }
            found && !done {
              if ($0 ~ /^---[[:space:]]*$/) next
              buf[n++] = $0
            }
            END {
              s=0;   while (s < n  && buf[s] ~ /^[[:space:]]*$/) s++
              e=n-1; while (e >= s && buf[e] ~ /^[[:space:]]*$/) e--
              for (i=s; i<=e; i++) print buf[i]
            }
          ' CHANGELOG.md > RELEASE_NOTES.md

          # Fallback so the release is never published with an empty body.
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog entry found for v$VER."
            printf 'Trackmind v%s\n\nSee [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for details.\n' \
              "$VER" "$GITHUB_REPOSITORY" > RELEASE_NOTES.md
          fi

          echo "----- release notes -----"
          cat RELEASE_NOTES.md
          echo "-------------------------"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: pyinstaller Trackmind.spec

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer
        run: >
          & "C:\Program Files (x86)\NSIS\makensis.exe"
          /DAPP_VERSION=${{ steps.ver.outputs.version }}
          /DAPP_VERSION_4=${{ steps.ver.outputs.version4 }}
          installer.nsi

      - name: Create source archive
        shell: bash
        run: |
          git archive --format=zip \
            --prefix=Trackmind-v${{ steps.ver.outputs.version }}/ \
            HEAD -o Trackmind-v${{ steps.ver.outputs.version }}-source.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Trackmind v${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            Trackmind_Setup_v${{ steps.ver.outputs.version }}.exe
            Trackmind-v${{ steps.ver.outputs.version }}-source.zip
